<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Spellrot — Social Card</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#060810;--teal:#00d4ff;--purple:#a78bfa;--amber:#f59e0b;
  --necrotic:#86efac;--void:#0a0f1a;
  --text:#f0f4ff;--dim:rgba(240,244,255,.5);
  --font:'Space Grotesk',system-ui,sans-serif;
}
html,body{width:1200px;height:630px;overflow:hidden;background:var(--bg);color:var(--text);font-family:var(--font)}

.bg{position:absolute;inset:0;overflow:hidden}
.bg-gradient{position:absolute;inset:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 50%,rgba(124,58,237,.28) 0%,transparent 55%),
    radial-gradient(ellipse 60% 70% at 85% 20%,rgba(0,212,255,.14) 0%,transparent 55%),
    radial-gradient(ellipse 50% 50% at 80% 80%,rgba(134,239,172,.08) 0%,transparent 50%),
    linear-gradient(180deg,#060810 0%,#0b0820 50%,#060810 100%);
}
canvas{position:absolute;inset:0}

.arcane{position:absolute;top:50%;right:60px;transform:translateY(-50%);width:360px;height:360px}
.arcane svg{width:100%;height:100%}
.cring{fill:none;stroke:rgba(0,212,255,.45);stroke-width:1.5}
.cring-corrupt{fill:none;stroke:rgba(134,239,172,.3);stroke-width:1;stroke-dasharray:8 4}
.cline{stroke:rgba(0,212,255,.14);stroke-width:.6}
.cnode{fill:rgba(0,212,255,.55);stroke:rgba(0,212,255,.9);stroke-width:1.5}
.cnode-z{fill:rgba(134,239,172,.55);stroke:rgba(134,239,172,.95);stroke-width:2}
.crack{stroke:rgba(134,239,172,.35);stroke-width:1.2;fill:none;stroke-linecap:round}

.content{position:absolute;top:50%;left:80px;transform:translateY(-50%);max-width:640px;z-index:10}
.tag{
  font-size:13px;font-weight:600;letter-spacing:.32em;text-transform:uppercase;
  color:var(--necrotic);opacity:.8;margin-bottom:22px;
}
.title{
  font-size:100px;font-weight:700;line-height:.92;letter-spacing:-.04em;
  background:linear-gradient(130deg,#fff 15%,#a5d8ff 50%,#9b8cff 80%,#86efac 100%);
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  margin-bottom:20px;
}
.tagline{
  font-size:22px;font-weight:400;color:var(--dim);line-height:1.45;
  max-width:560px;margin-bottom:34px;
}
.meta{
  display:flex;align-items:center;gap:14px;
  font-size:13px;font-weight:500;letter-spacing:.08em;text-transform:uppercase;
  color:rgba(255,255,255,.4);
}
.pill{
  display:inline-flex;align-items:center;gap:8px;
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);
  border-radius:30px;padding:8px 18px;
}
.pill .lbl{opacity:.4;font-size:10px}
.url{color:var(--teal);opacity:.8}

.footer{
  position:absolute;bottom:34px;left:80px;right:80px;
  display:flex;justify-content:space-between;align-items:center;
  font-size:12px;font-weight:600;letter-spacing:.16em;text-transform:uppercase;
  color:rgba(255,255,255,.25);
}
</style>
</head>
<body>
<div class="bg">
  <div class="bg-gradient"></div>
  <canvas id="stars"></canvas>
</div>

<!-- Corrupted arcane circle -->
<div class="arcane">
  <svg viewBox="0 0 340 340">
    <!-- Outer clean ring -->
    <circle class="cring" cx="170" cy="170" r="140"/>
    <!-- Inner corrupted ring (dashed, necrotic) -->
    <circle class="cring-corrupt" cx="170" cy="170" r="80"/>

    <!-- 8 connecting lines -->
    <line class="cline" x1="170" y1="30" x2="269.5" y2="269.5"/>
    <line class="cline" x1="269.5" y1="70.5" x2="70.5" y2="269.5"/>
    <line class="cline" x1="310" y1="170" x2="30" y2="170"/>
    <line class="cline" x1="269.5" y1="269.5" x2="70.5" y2="70.5"/>
    <line class="cline" x1="170" y1="310" x2="170" y2="30"/>
    <line class="cline" x1="70.5" y1="269.5" x2="269.5" y2="70.5"/>
    <line class="cline" x1="30" y1="170" x2="310" y2="170"/>
    <line class="cline" x1="70.5" y1="70.5" x2="269.5" y2="269.5"/>

    <!-- Corruption cracks breaking out past the outer ring -->
    <path class="crack" d="M 70.5 269.5 L 48 298 L 38 312"/>
    <path class="crack" d="M 70.5 269.5 L 52 285"/>
    <path class="crack" d="M 170 310 L 158 328 L 165 340"/>

    <!-- 6 clean nodes (teal) -->
    <circle class="cnode" cx="170" cy="30" r="6"/>
    <circle class="cnode" cx="269.5" cy="70.5" r="6"/>
    <circle class="cnode" cx="310" cy="170" r="6"/>
    <circle class="cnode" cx="269.5" cy="269.5" r="6"/>
    <circle class="cnode" cx="30" cy="170" r="6"/>
    <circle class="cnode" cx="70.5" cy="70.5" r="6"/>

    <!-- 2 corrupted / wizard-zombie nodes (necrotic green, larger) -->
    <circle class="cnode-z" cx="70.5" cy="269.5" r="9"/>
    <circle cx="70.5" cy="269.5" r="4" fill="rgba(134,239,172,.9)"/>
    <circle class="cnode-z" cx="170" cy="310" r="9"/>
    <circle cx="170" cy="310" r="4" fill="rgba(134,239,172,.9)"/>

    <!-- Center void — skull-like eyes -->
    <circle cx="170" cy="170" r="28" fill="#070c18" stroke="rgba(134,239,172,.25)" stroke-width="1.5"/>
    <circle cx="163" cy="167" r="5" fill="rgba(134,239,172,.75)"/>
    <circle cx="177" cy="167" r="5" fill="rgba(134,239,172,.75)"/>
    <!-- Jaw hint -->
    <path d="M 160 177 Q 170 183 180 177" stroke="rgba(134,239,172,.4)" stroke-width="1.2" fill="none" stroke-linecap="round"/>
  </svg>
</div>

<div class="content">
  <div class="tag">UE5.7 · Claude Code Game Studios</div>
  <h1 class="title">Spell<br>rot</h1>
  <p class="tagline">Last wizard standing. Every hit corrupts your spells — more power, closer to transformation.</p>
  <div class="meta">
    <div class="pill"><span class="lbl">Repo</span><span class="url">github.com/ibrews/spellrot</span></div>
  </div>
</div>

<div class="footer">
  <span>Unreal Engine 5.7 · Blueprint · ECABridge</span>
  <span>Wave Survival · Corruption Mechanic · 49 AI Agents</span>
</div>

<script>
const c=document.getElementById('stars'),ctx=c.getContext('2d');
c.width=1200;c.height=630;
const stars=[];
for(let i=0;i<180;i++)stars.push({
  x:Math.random()*1200,y:Math.random()*630,
  r:Math.random()*.9+.2,o:Math.random()*.5+.1
});
stars.forEach(s=>{
  ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);
  ctx.fillStyle=`rgba(200,220,255,${s.o})`;ctx.fill();
});
</script>
</body>
</html>
